<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>결제 실패 - 건밀그린</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: linear-gradient(135deg, #FFF3F3 0%, #FFF8E7 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 3rem 2.5rem;
            max-width: 440px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            text-align: center;
        }
        .icon { font-size: 5rem; margin-bottom: 1.5rem; }
        h1 { color: #D32F2F; font-size: 1.8rem; margin-bottom: 0.5rem; }
        .subtitle { color: #757575; margin-bottom: 2rem; line-height: 1.7; }
        .error-box {
            background: #FFF3F3;
            border: 1px solid #FFCDD2;
            border-radius: 12px;
            padding: 1.2rem;
            margin-bottom: 2rem;
            font-size: 0.9rem;
            color: #C62828;
            line-height: 1.6;
        }
        .error-code { font-size: 0.8rem; color: #BDBDBD; margin-top: 0.5rem; }
        .btn {
            display: block;
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Noto Sans KR', sans-serif;
            text-decoration: none;
            transition: all 0.3s;
            margin-bottom: 0.8rem;
        }
        .btn-retry {
            background: linear-gradient(135deg, #7CB342, #2D5016);
            color: white;
        }
        .btn-retry:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(45,80,22,0.3); }
        .btn-home {
            background: #F5F5F5;
            color: #424242;
        }
        .btn-home:hover { background: #E0E0E0; }
        .kakao-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.8rem 1.5rem;
            background: #FEE500;
            color: #3C1E1E;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            margin-top: 1rem;
            transition: all 0.3s;
        }
        .kakao-btn:hover { transform: translateY(-2px); }
    </style>
</head>
<body>
<div class="card">
    <div class="icon">😢</div>
    <h1>결제 실패</h1>
    <p class="subtitle">결제가 완료되지 않았습니다.<br>다시 시도해 주세요.</p>

    <div class="error-box">
        <div id="errorMessage">알 수 없는 오류가 발생했습니다.</div>
        <div class="error-code" id="errorCode"></div>
    </div>

    <button class="btn btn-retry" onclick="history.back()">↩ 다시 결제하기</button>
    <a href="https://kmealgreen.vercel.app/" class="btn btn-home">🏠 홈으로 돌아가기</a>

    <a href="http://pf.kakao.com/_IHlyG/chat" target="_blank" class="kakao-btn">
        💬 카카오톡으로 문의하기
    </a>
</div>

<script>
window.addEventListener('load', () => {
    const params  = new URLSearchParams(window.location.search);
    const code    = params.get('code');
    const message = params.get('message');
    const orderId = params.get('orderId');

    // 에러 메시지 표시
    const msgMap = {
        'PAY_PROCESS_CANCELED':  '결제를 취소하셨습니다.',
        'PAY_PROCESS_ABORTED':   '결제 도중 오류가 발생했습니다.',
        'REJECT_CARD_COMPANY':   '카드사에서 결제를 거절했습니다. 카드 정보를 확인해주세요.',
        'INVALID_STOPPED_CARD':  '사용이 정지된 카드입니다.',
        'EXCEED_MAX_DAILY_PAYMENT_COUNT': '일일 결제 한도를 초과했습니다.',
        'NOT_ENOUGH_BALANCE':    '잔액이 부족합니다.',
    };

    document.getElementById('errorMessage').textContent =
        (message ? decodeURIComponent(message) : null) ||
        msgMap[code] ||
        '결제 처리 중 문제가 발생했습니다. 잠시 후 다시 시도해 주세요.';

    if (code) {
        document.getElementById('errorCode').textContent = `오류 코드: ${code}${orderId ? ' | 주문번호: ' + orderId : ''}`;
    }
});
</script>
</body>
</html>
