<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>건밀그린 매니저</title>
<style>
:root {
  --bg: #0F1117;
  --surface: #181B24;
  --surface2: #1F2333;
  --green: #4ADE80;
  --text: #F1F5F9;
  --text-2: #94A3B8;
  --text-3: #64748B;
  --border: rgba(255,255,255,0.07);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
  font-family: 'Noto Sans KR', sans-serif; 
  background: var(--bg); 
  color: var(--text); 
  padding: 20px;
}
.container { max-width: 1400px; margin: 0 auto; }
.header {
  background: var(--surface);
  padding: 20px 30px;
  border-radius: 12px;
  margin-bottom: 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.logo { font-size: 24px; color: var(--green); font-weight: 700; }
.logout-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text-2);
  padding: 8px 16px;
  border-radius: 6px;
  cursor: pointer;
}
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  margin-bottom: 20px;
}
.card-title {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 20px;
  color: var(--green);
}
.login-form {
  max-width: 400px;
  margin: 100px auto;
}
.form-group {
  margin-bottom: 16px;
}
.form-label {
  display: block;
  margin-bottom: 8px;
  color: var(--text-3);
  font-size: 14px;
}
.form-input {
  width: 100%;
  padding: 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 14px;
}
.btn-primary {
  width: 100%;
  padding: 12px;
  background: var(--green);
  border: none;
  border-radius: 6px;
  color: #000;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
}
.btn-primary:hover { background: #22c55e; }
table {
  width: 100%;
  border-collapse: collapse;
}
th {
  padding: 12px;
  text-align: left;
  font-size: 12px;
  color: var(--text-3);
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
}
td {
  padding: 12px;
  font-size: 14px;
  border-bottom: 1px solid var(--border);
  color: var(--text-2);
}
tr:hover td { background: rgba(255,255,255,0.02); }
.badge {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 600;
}
.badge-success { background: rgba(74,222,128,0.15); color: var(--green); }
.badge-warning { background: rgba(251,191,36,0.15); color: #FBBF24; }
.status {
  padding: 10px;
  margin: 10px 0;
  border-radius: 6px;
}
.status.success { background: #065f46; color: #4ADE80; }
.status.error { background: #7f1d1d; color: #fca5a5; }
.hidden { display: none; }
</style>
</head>
<body>

<!-- 로그인 화면 -->
<div id="loginPage">
  <div class="card login-form">
    <div class="card-title">건밀그린 매니저 로그인</div>
    <form onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label">아이디</label>
        <input type="text" id="loginId" class="form-input" required>
      </div>
      <div class="form-group">
        <label class="form-label">비밀번호</label>
        <input type="password" id="loginPw" class="form-input" required>
      </div>
      <button type="submit" class="btn-primary">로그인</button>
    </form>
    <div id="loginStatus"></div>
  </div>
</div>

<!-- 매니저 화면 -->
<div id="managerPage" class="hidden">
  <div class="container">
    <div class="header">
      <div class="logo">건밀그린 매니저</div>
      <button class="logout-btn" onclick="logout()">로그아웃</button>
    </div>

    <!-- Supabase 연결 상태 -->
    <div class="card">
      <div class="card-title">시스템 상태</div>
      <div id="systemStatus"></div>
    </div>

    <!-- 통계 대시보드 -->
    <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 20px;">
      <div class="card" style="text-align: center;">
        <div style="font-size: 12px; color: var(--text-3); margin-bottom: 8px;">총 주문</div>
        <div id="statTotal" style="font-size: 32px; font-weight: 700; color: var(--green);">-</div>
      </div>
      <div class="card" style="text-align: center;">
        <div style="font-size: 12px; color: var(--text-3); margin-bottom: 8px;">오늘 주문</div>
        <div id="statToday" style="font-size: 32px; font-weight: 700; color: #60A5FA;">-</div>
      </div>
      <div class="card" style="text-align: center;">
        <div style="font-size: 12px; color: var(--text-3); margin-bottom: 8px;">총 매출</div>
        <div id="statRevenue" style="font-size: 32px; font-weight: 700; color: #FBBF24;">-</div>
      </div>
      <div class="card" style="text-align: center;">
        <div style="font-size: 12px; color: var(--text-3); margin-bottom: 8px;">결제완료</div>
        <div id="statCompleted" style="font-size: 32px; font-weight: 700; color: #A78BFA;">-</div>
      </div>
    </div>

    <!-- 주문 목록 -->
    <div class="card">
      <div class="card-title">주문 내역</div>
      <button class="btn-primary" onclick="loadOrders()" style="width: auto; margin-bottom: 20px;">새로고침</button>
      <div id="ordersContent">로딩 중...</div>
    </div>

    <!-- 식단 목록 -->
    <div class="card">
      <div class="card-title">식단 목록</div>
      <button class="btn-primary" onclick="loadMeals()" style="width: auto; margin-bottom: 20px;">새로고침</button>
      <div id="mealsContent">로딩 중...</div>
    </div>
  </div>
</div>

<!-- Supabase CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// ========================================
// 전역 변수 (한 번만 선언!)
// ========================================
let supabaseClient = null;
let isLoggedIn = false;

// 매니저 계정
const MANAGER_ID = 'kmeal_manager';
const MANAGER_PW = 'green2024!';

// ========================================
// 초기화
// ========================================
window.addEventListener('load', () => {
  console.log('=== 매니저 사이트 시작 ===');
  initSupabase();
});

// ========================================
// Supabase 초기화 (단 한 번!)
// ========================================
function initSupabase() {
  try {
    console.log('🔵 Supabase 초기화 시작...');
    
    if (typeof window.supabase === 'undefined') {
      throw new Error('Supabase CDN 로딩 실패');
    }
    
    const SUPABASE_URL = 'https://tuxsyxywdeecdflgyuib.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR1eHN5eHl3ZGVlY2RmbGd5dWliIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2NzY0NzQsImV4cCI6MjA4NzI1MjQ3NH0.M5JNFHBTiPK5zv3DwBieKn5f8oRdmmRKZO99o0-tUWk';
    
    supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    console.log('✅ Supabase 초기화 완료');
    console.log('✅ supabaseClient.from:', typeof supabaseClient.from);
    
    updateSystemStatus('✅ Supabase 연결 성공', 'success');
    
  } catch (error) {
    console.error('❌ Supabase 초기화 실패:', error);
    updateSystemStatus('❌ Supabase 연결 실패: ' + error.message, 'error');
  }
}

// ========================================
// 로그인
// ========================================
function handleLogin(event) {
  event.preventDefault();
  
  const id = document.getElementById('loginId').value;
  const pw = document.getElementById('loginPw').value;
  
  if (id === MANAGER_ID && pw === MANAGER_PW) {
    isLoggedIn = true;
    document.getElementById('loginPage').classList.add('hidden');
    document.getElementById('managerPage').classList.remove('hidden');
    console.log('✅ 로그인 성공');
    loadOrders();
    loadMeals();
  } else {
    document.getElementById('loginStatus').innerHTML = 
      '<div class="status error">❌ 아이디 또는 비밀번호가 틀립니다</div>';
  }
}

function logout() {
  isLoggedIn = false;
  document.getElementById('loginPage').classList.remove('hidden');
  document.getElementById('managerPage').classList.add('hidden');
  document.getElementById('loginId').value = '';
  document.getElementById('loginPw').value = '';
}

// ========================================
// 주문 조회
// ========================================
async function loadOrders() {
  const contentEl = document.getElementById('ordersContent');
  
  try {
    contentEl.innerHTML = '<div class="status">⏳ 주문 조회 중...</div>';
    console.log('🔵 주문 조회 시작...');
    
    if (!supabaseClient) {
      throw new Error('Supabase 클라이언트가 초기화되지 않음');
    }
    
    const { data, error } = await supabaseClient
      .from('orders')
      .select('*')
      .order('order_date', { ascending: false });
    
    if (error) throw error;
    
    console.log('✅ 주문 조회 성공:', data.length + '건');
    
    // 통계 업데이트
    updateStats(data);
    
    if (data.length === 0) {
      contentEl.innerHTML = '<div class="status">📋 주문 데이터가 없습니다</div>';
      return;
    }
    
    // 테이블 생성
    let html = `
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>고객명</th>
            <th>전화번호</th>
            <th>주문일</th>
            <th>플랜</th>
            <th>금액</th>
            <th>결제</th>
            <th>상태</th>
          </tr>
        </thead>
        <tbody>
    `;
    
    data.forEach(order => {
      html += `
        <tr>
          <td>${order.id}</td>
          <td>${order.name || order.user_id || '-'}</td>
          <td>${order.phone || '-'}</td>
          <td>${order.order_date || '-'}</td>
          <td>${order.plan || '-'}</td>
          <td>${order.total_price ? order.total_price.toLocaleString() + '원' : '-'}</td>
          <td>${order.payment_method || '-'}</td>
          <td>
            <select onchange="changeOrderStatus(${order.id}, this.value)" style="padding: 4px 8px; background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 4px;">
              <option value="입금대기" ${order.status === '입금대기' ? 'selected' : ''}>입금대기</option>
              <option value="결제확인중" ${order.status === '결제확인중' ? 'selected' : ''}>결제확인중</option>
              <option value="결제완료" ${order.status === '결제완료' ? 'selected' : ''}>결제완료</option>
              <option value="준비중" ${order.status === '준비중' ? 'selected' : ''}>준비중</option>
              <option value="준비완료" ${order.status === '준비완료' ? 'selected' : ''}>준비완료</option>
              <option value="완료" ${order.status === '완료' ? 'selected' : ''}>완료</option>
              <option value="취소" ${order.status === '취소' ? 'selected' : ''}>취소</option>
            </select>
          </td>
        </tr>
      `;
    });
    
    html += '</tbody></table>';
    contentEl.innerHTML = html;
    
  } catch (error) {
    console.error('❌ 주문 조회 실패:', error);
    contentEl.innerHTML = `<div class="status error">❌ 조회 실패: ${error.message}</div>`;
  }
}

// ========================================
// 식단 조회
// ========================================
async function loadMeals() {
  const contentEl = document.getElementById('mealsContent');
  
  try {
    contentEl.innerHTML = '<div class="status">⏳ 식단 조회 중...</div>';
    console.log('🔵 식단 조회 시작...');
    
    if (!supabaseClient) {
      throw new Error('Supabase 클라이언트가 초기화되지 않음');
    }
    
    const { data, error } = await supabaseClient
      .from('meals')
      .select('*')
      .order('meal_date', { ascending: false })
      .limit(30);
    
    if (error) throw error;
    
    console.log('✅ 식단 조회 성공:', data.length + '건');
    
    if (data.length === 0) {
      contentEl.innerHTML = '<div class="status">📋 식단 데이터가 없습니다</div>';
      return;
    }
    
    // 테이블 생성
    let html = `
      <table>
        <thead>
          <tr>
            <th>날짜</th>
            <th>시간</th>
            <th>메뉴코드</th>
            <th>메뉴명</th>
            <th>설명</th>
            <th>칼로리</th>
          </tr>
        </thead>
        <tbody>
    `;
    
    data.forEach(meal => {
      html += `
        <tr>
          <td>${meal.meal_date || '-'}</td>
          <td>${meal.time || '-'}</td>
          <td>${meal.menu_code || '-'}</td>
          <td><strong>${meal.name || '-'}</strong></td>
          <td style="color: var(--text-3); font-size: 13px;">${meal.description || '-'}</td>
          <td>${meal.calorie ? meal.calorie + 'kcal' : '-'}</td>
        </tr>
      `;
    });
    
    html += '</tbody></table>';
    contentEl.innerHTML = html;
    
  } catch (error) {
    console.error('❌ 식단 조회 실패:', error);
    contentEl.innerHTML = `<div class="status error">❌ 조회 실패: ${error.message}</div>`;
  }
}

// ========================================
// 통계 업데이트
// ========================================
function updateStats(orders) {
  try {
    // 총 주문 수
    const totalCount = orders.length;
    
    // 오늘 주문 수
    const today = new Date().toISOString().split('T')[0];
    const todayCount = orders.filter(o => o.order_date === today).length;
    
    // 총 매출 (취소 제외)
    const totalRevenue = orders
      .filter(o => o.status !== '취소')
      .reduce((sum, o) => sum + (o.total_price || 0), 0);
    
    // 결제완료 주문 수
    const completedCount = orders.filter(o => o.status === '결제완료').length;
    
    // 화면 업데이트
    document.getElementById('statTotal').textContent = totalCount.toLocaleString();
    document.getElementById('statToday').textContent = todayCount.toLocaleString();
    document.getElementById('statRevenue').textContent = (totalRevenue / 10000).toFixed(1) + '만원';
    document.getElementById('statCompleted').textContent = completedCount.toLocaleString();
    
    console.log('📊 통계:', { totalCount, todayCount, totalRevenue, completedCount });
    
  } catch (error) {
    console.error('❌ 통계 계산 실패:', error);
  }
}

// ========================================
// 주문 상태 변경
// ========================================
async function changeOrderStatus(orderId, newStatus) {
  try {
    console.log(`🔵 주문 ${orderId} 상태 변경: ${newStatus}`);
    
    const { data, error } = await supabaseClient
      .from('orders')
      .update({ status: newStatus })
      .eq('id', orderId)
      .select();
    
    if (error) throw error;
    
    console.log('✅ 상태 변경 완료:', data);
    
    // 성공 메시지 (2초 후 사라짐)
    const msg = document.createElement('div');
    msg.className = 'status success';
    msg.textContent = `✅ 주문 #${orderId} 상태가 "${newStatus}"로 변경되었습니다`;
    msg.style.position = 'fixed';
    msg.style.top = '20px';
    msg.style.right = '20px';
    msg.style.zIndex = '9999';
    document.body.appendChild(msg);
    
    setTimeout(() => msg.remove(), 2000);
    
  } catch (error) {
    console.error('❌ 상태 변경 실패:', error);
    alert('상태 변경 실패: ' + error.message);
  }
}

// ========================================
// 시스템 상태 업데이트
// ========================================
function updateSystemStatus(message, type) {
  const el = document.getElementById('systemStatus');
  if (el) {
    el.innerHTML = `<div class="status ${type}">${message}</div>`;
  }
}
</script>

</body>
</html>
