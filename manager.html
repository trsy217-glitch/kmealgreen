<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>건밀그린 매니저 대시보드</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:sans-serif;background:#0F1117;color:#F1F5F9;}

/* 사이드바 */
.sidebar{width:250px;height:100vh;background:#181B24;position:fixed;left:0;top:0;padding:20px;border-right:1px solid #252A3D;}
.logo{font-size:1.5rem;color:#4ADE80;font-weight:700;margin-bottom:30px;}
.nav-item{padding:12px 15px;margin:5px 0;border-radius:8px;cursor:pointer;transition:all 0.3s;color:#94A3B8;}
.nav-item:hover{background:#1F2333;color:#F1F5F9;}
.nav-item.active{background:#4ADE80;color:#0F1117;}

/* 메인 */
.main{margin-left:250px;padding:20px;}
.header{background:#181B24;padding:20px;border-radius:12px;margin-bottom:20px;border:1px solid #252A3D;}
.header h1{color:#4ADE80;font-size:1.8rem;}

/* 페이지 */
.page{display:none;}
.page.active{display:block;}

/* 카드 */
.card{background:#181B24;padding:20px;border-radius:12px;margin-bottom:20px;border:1px solid #252A3D;}
.card h2{color:#4ADE80;margin-bottom:15px;font-size:1.3rem;}

/* 통계 */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:15px;margin-bottom:20px;}
.stat-card{background:#181B24;padding:20px;border-radius:12px;border:1px solid #252A3D;position:relative;}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:12px 12px 0 0;}
.stat-card.green::before{background:#4ADE80;}
.stat-card.blue::before{background:#60A5FA;}
.stat-card.amber::before{background:#FBBF24;}
.stat-card.purple::before{background:#A78BFA;}
.stat-label{font-size:0.85rem;color:#64748B;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.05em;}
.stat-value{font-size:2rem;font-weight:700;color:#F1F5F9;}

/* 테이블 */
table{width:100%;border-collapse:collapse;}
th{background:#1F2333;padding:12px;text-align:left;color:#64748B;font-size:0.85rem;text-transform:uppercase;border-bottom:1px solid #252A3D;}
td{padding:12px;border-bottom:1px solid #252A3D;color:#F1F5F9;font-size:0.9rem;}
tr:hover td{background:#1F2333;}

/* 버튼 */
.btn{padding:10px 20px;border:none;border-radius:8px;cursor:pointer;font-weight:600;font-size:0.9rem;transition:all 0.3s;}
.btn-primary{background:#4ADE80;color:#0F1117;}
.btn-primary:hover{background:#22C55E;}
.btn-danger{background:#F87171;color:white;}
.btn-danger:hover{background:#EF4444;}
.btn-sm{padding:6px 12px;font-size:0.8rem;}

/* 뱃지 */
.badge{padding:4px 12px;border-radius:12px;font-size:0.75rem;font-weight:600;}
.badge-pending{background:rgba(251,191,36,0.15);color:#FBBF24;}
.badge-confirmed{background:rgba(96,165,250,0.15);color:#60A5FA;}
.badge-ready{background:rgba(74,222,128,0.15);color:#4ADE80;}
.badge-done{background:rgba(100,116,139,0.15);color:#64748B;}

/* 모달 */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);justify-content:center;align-items:center;z-index:1000;}
.modal.active{display:flex;}
.modal-content{background:#181B24;padding:30px;border-radius:16px;max-width:500px;width:90%;border:1px solid #252A3D;}
.modal-content h2{color:#4ADE80;margin-bottom:20px;}
.form-group{margin-bottom:15px;}
.form-group label{display:block;margin-bottom:6px;color:#94A3B8;font-size:0.9rem;font-weight:600;}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px;background:#0F1117;border:1px solid:#252A3D;border-radius:8px;color:#F1F5F9;font-family:inherit;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:#4ADE80;}

/* 메시지 */
.msg{padding:12px;border-radius:8px;margin-bottom:15px;display:none;}
.msg.success{background:rgba(74,222,128,0.1);border:1px solid #4ADE80;color:#4ADE80;}
.msg.error{background:rgba(248,113,113,0.1);border:1px solid #F87171;color:#F87171;}

/* 메뉴 카드 */
.menu-card{background:#1F2333;padding:15px;border-radius:8px;margin-bottom:10px;border-left:3px solid #4ADE80;}
.meal-info{background:#0F1117;padding:15px;border-radius:8px;margin-top:15px;border:1px solid #252A3D;display:none;}
.meal-info.show{display:block;}
</style>
</head>
<body>

<!-- 사이드바 -->
<div class="sidebar">
  <div class="logo">🥗 건밀그린</div>
  <div class="nav-item active" onclick="showPage('dashboard')">📊 대시보드</div>
  <div class="nav-item" onclick="showPage('orders')">📦 주문 관리</div>
  <div class="nav-item" onclick="showPage('menu')">📋 메뉴 관리</div>
  <div class="nav-item" onclick="showPage('meal')">🗓️ 식단 관리</div>
  <div class="nav-item" onclick="showPage('customers')">👥 고객 관리</div>
</div>

<!-- 메인 -->
<div class="main">
  <div class="header">
    <h1>매니저 대시보드</h1>
  </div>

  <div id="msg" class="msg"></div>

  <!-- 대시보드 페이지 -->
  <div id="dashboardPage" class="page active">
    <div class="stats-grid">
      <div class="stat-card green">
        <div class="stat-label">오늘 주문</div>
        <div class="stat-value" id="todayOrders">0</div>
      </div>
      <div class="stat-card blue">
        <div class="stat-label">전체 주문</div>
        <div class="stat-value" id="totalOrders">0</div>
      </div>
      <div class="stat-card amber">
        <div class="stat-label">전체 회원</div>
        <div class="stat-value" id="totalUsers">0</div>
      </div>
      <div class="stat-card purple">
        <div class="stat-label">등록 메뉴</div>
        <div class="stat-value" id="totalMenus">0</div>
      </div>
    </div>

    <div class="card">
      <h2>최근 주문</h2>
      <table>
        <thead>
          <tr><th>날짜</th><th>고객</th><th>플랜</th><th>금액</th><th>상태</th></tr>
        </thead>
        <tbody id="recentOrdersTable">
          <tr><td colspan="5" style="text-align:center;color:#64748B;">로딩 중...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- 주문 관리 페이지 -->
  <div id="ordersPage" class="page">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;">
        <h2>전체 주문</h2>
        <select id="orderFilter" onchange="filterOrders()" style="padding:8px;background:#0F1117;border:1px solid #252A3D;border-radius:6px;color:#F1F5F9;">
          <option value="all">전체</option>
          <option value="입금대기">입금대기</option>
          <option value="결제완료">결제완료</option>
          <option value="준비중">준비중</option>
          <option value="완료">완료</option>
        </select>
      </div>
      <table>
        <thead>
          <tr><th>주문일</th><th>고객</th><th>플랜</th><th>픽업</th><th>요일/시간</th><th>금액</th><th>상태</th><th>작업</th></tr>
        </thead>
        <tbody id="ordersTable">
          <tr><td colspan="8" style="text-align:center;color:#64748B;">로딩 중...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- 메뉴 관리 페이지 -->
  <div id="menuPage" class="page">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;">
        <h2>메뉴 관리</h2>
        <button class="btn btn-primary" onclick="openAddMenu()">+ 메뉴 추가</button>
      </div>
      <table>
        <thead>
          <tr><th>코드</th><th>메뉴명</th><th>재료/설명</th><th>칼로리</th><th>작업</th></tr>
        </thead>
        <tbody id="menuTable">
          <tr><td colspan="5" style="text-align:center;color:#64748B;">로딩 중...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- 식단 관리 페이지 -->
  <div id="mealPage" class="page">
    <div class="card">
      <h2>식단 추가</h2>
      <div class="form-group">
        <label>날짜</label>
        <input type="date" id="mealDate">
      </div>
      <div class="form-group">
        <label>시간</label>
        <select id="mealTime">
          <option value="점심">점심</option>
          <option value="저녁">저녁</option>
        </select>
      </div>
      <div class="form-group">
        <label>메뉴 선택</label>
        <select id="mealMenu" onchange="showMealInfo()">
          <option value="">메뉴 선택</option>
        </select>
      </div>
      <div id="mealInfo" class="meal-info">
        <h3 id="infoName" style="color:#4ADE80;margin-bottom:10px;"></h3>
        <p id="infoDesc" style="color:#94A3B8;margin-bottom:8px;"></p>
        <p id="infoCalorie" style="color:#FBBF24;"></p>
      </div>
      <button class="btn btn-primary" onclick="saveMeal()">식단 저장</button>
    </div>

    <div class="card">
      <h2>등록된 식단</h2>
      <div style="margin-bottom:15px;">
        <input type="month" id="mealMonthFilter" onchange="loadMeals()" style="padding:8px;background:#0F1117;border:1px solid #252A3D;border-radius:6px;color:#F1F5F9;">
      </div>
      <table>
        <thead>
          <tr><th>날짜</th><th>시간</th><th>메뉴</th><th>칼로리</th><th>작업</th></tr>
        </thead>
        <tbody id="mealsTable">
          <tr><td colspan="5" style="text-align:center;color:#64748B;">식단을 선택하세요</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- 고객 관리 페이지 -->
  <div id="customersPage" class="page">
    <div class="card">
      <h2>전체 고객</h2>
      <table>
        <thead>
          <tr><th>아이디</th><th>이름</th><th>이메일</th><th>전화번호</th><th>가입일</th></tr>
        </thead>
        <tbody id="customersTable">
          <tr><td colspan="5" style="text-align:center;color:#64748B;">로딩 중...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- 메뉴 추가 모달 -->
<div id="addMenuModal" class="modal">
  <div class="modal-content">
    <h2>새 메뉴 추가</h2>
    <div class="form-group">
      <label>메뉴 코드</label>
      <input type="text" id="newMenuCode" placeholder="M011">
    </div>
    <div class="form-group">
      <label>메뉴명</label>
      <input type="text" id="newMenuName" placeholder="새우볶음밥">
    </div>
    <div class="form-group">
      <label>재료/설명</label>
      <textarea id="newMenuDesc" rows="3" placeholder="신선한 새우와 야채"></textarea>
    </div>
    <div class="form-group">
      <label>칼로리 (kcal)</label>
      <input type="number" id="newMenuCalorie" placeholder="450">
    </div>
    <div style="display:flex;gap:10px;margin-top:20px;">
      <button class="btn btn-primary" onclick="saveNewMenu()">저장</button>
      <button class="btn btn-danger" onclick="closeAddMenu()">취소</button>
    </div>
  </div>
</div>

<!-- 메뉴 수정 모달 -->
<div id="editMenuModal" class="modal">
  <div class="modal-content">
    <h2>메뉴 수정</h2>
    <input type="hidden" id="editMenuCode">
    <div class="form-group">
      <label>메뉴명</label>
      <input type="text" id="editMenuName">
    </div>
    <div class="form-group">
      <label>재료/설명</label>
      <textarea id="editMenuDesc" rows="3"></textarea>
    </div>
    <div class="form-group">
      <label>칼로리 (kcal)</label>
      <input type="number" id="editMenuCalorie">
    </div>
    <div style="display:flex;gap:10px;margin-top:20px;">
      <button class="btn btn-primary" onclick="saveEditMenu()">저장</button>
      <button class="btn btn-danger" onclick="closeEditMenu()">취소</button>
    </div>
  </div>
</div>

<script>
// Supabase 설정
const cfg = {
  url: 'https://tuxsyxywdeecdflgyuib.supabase.co',
  key: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR1eHN5eHl3ZGVlY2RmbGd5dWliIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2NzY0NzQsImV4cCI6MjA4NzI1MjQ3NH0.M5JNFHBTiPK5zv3DwBieKn5f8oRdmmRKZO99o0-tUWk'
};

let db, menus = [], orders = [], allMeals = [];

// 초기화
function init() {
  if (!window.supabase) {
    showMsg('Supabase 연결 실패', 'error');
    return;
  }
  db = window.supabase.createClient(cfg.url, cfg.key);
  console.log('✅ Supabase 연결');
  
  loadDashboard();
  loadMenus();
  
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('mealDate').value = today;
  
  const thisMonth = new Date().toISOString().slice(0, 7);
  document.getElementById('mealMonthFilter').value = thisMonth;
}

// 페이지 전환
function showPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  
  document.getElementById(page + 'Page').classList.add('active');
  event.target.classList.add('active');
  
  if (page === 'dashboard') loadDashboard();
  if (page === 'orders') loadOrders();
  if (page === 'menu') loadMenus();
  if (page === 'meal') { loadMenus(); loadMeals(); }
  if (page === 'customers') loadCustomers();
}

// 대시보드 로드
async function loadDashboard() {
  try {
    const today = new Date().toISOString().split('T')[0];
    
    // 오늘 주문
    const { data: todayData } = await db.from('orders').select('*').eq('order_date', today);
    document.getElementById('todayOrders').textContent = (todayData || []).length;
    
    // 전체 주문
    const { data: allOrders } = await db.from('orders').select('*');
    orders = allOrders || [];
    document.getElementById('totalOrders').textContent = orders.length;
    
    // 전체 회원
    const { data: users } = await db.from('users').select('*');
    document.getElementById('totalUsers').textContent = (users || []).length;
    
    // 전체 메뉴
    const { data: menuData } = await db.from('menu_items').select('*');
    document.getElementById('totalMenus').textContent = (menuData || []).length;
    
    // 최근 주문 5개
    const recent = orders.slice(0, 5);
    const tbody = document.getElementById('recentOrdersTable');
    tbody.innerHTML = recent.length === 0 
      ? '<tr><td colspan="5" style="text-align:center;color:#64748B;">주문 없음</td></tr>'
      : recent.map(o => `
        <tr>
          <td>${o.order_date || '-'}</td>
          <td>${o.user_id || '-'}</td>
          <td>${o.plan || '-'}</td>
          <td>${(o.total_price || 0).toLocaleString()}원</td>
          <td><span class="badge badge-${getStatusClass(o.status)}">${o.status || '대기'}</span></td>
        </tr>
      `).join('');
  } catch (error) {
    console.error('대시보드 로드 실패:', error);
  }
}

// 주문 관리 로드
async function loadOrders() {
  try {
    const { data, error } = await db.from('orders').select('*').order('order_date', { ascending: false });
    if (error) throw error;
    
    orders = data || [];
    renderOrders(orders);
  } catch (error) {
    console.error('주문 로드 실패:', error);
  }
}

function renderOrders(data) {
  const tbody = document.getElementById('ordersTable');
  tbody.innerHTML = data.length === 0
    ? '<tr><td colspan="8" style="text-align:center;color:#64748B;">주문 없음</td></tr>'
    : data.map(o => `
      <tr>
        <td>${o.order_date || '-'}</td>
        <td>${o.user_id || '-'}</td>
        <td>${o.plan || '-'} (${o.plan_count || 0}회)</td>
        <td>${o.pickup_type || '-'}</td>
        <td>${o.days || '-'} / ${o.time || '-'}</td>
        <td>${(o.total_price || 0).toLocaleString()}원</td>
        <td><span class="badge badge-${getStatusClass(o.status)}">${o.status || '대기'}</span></td>
        <td>
          <select onchange="updateOrderStatus(${o.id}, this.value)" style="padding:4px;background:#0F1117;border:1px solid #252A3D;border-radius:4px;color:#F1F5F9;font-size:0.8rem;">
            <option value="입금대기" ${o.status==='입금대기'?'selected':''}>입금대기</option>
            <option value="결제완료" ${o.status==='결제완료'?'selected':''}>결제완료</option>
            <option value="준비중" ${o.status==='준비중'?'selected':''}>준비중</option>
            <option value="완료" ${o.status==='완료'?'selected':''}>완료</option>
          </select>
        </td>
      </tr>
    `).join('');
}

function filterOrders() {
  const filter = document.getElementById('orderFilter').value;
  const filtered = filter === 'all' ? orders : orders.filter(o => o.status === filter);
  renderOrders(filtered);
}

async function updateOrderStatus(orderId, newStatus) {
  try {
    const { error } = await db.from('orders').update({ status: newStatus }).eq('id', orderId);
    if (error) throw error;
    showMsg('상태 변경 완료', 'success');
    loadOrders();
  } catch (error) {
    showMsg('상태 변경 실패: ' + error.message, 'error');
  }
}

function getStatusClass(status) {
  if (status === '입금대기') return 'pending';
  if (status === '결제완료') return 'confirmed';
  if (status === '준비중') return 'confirmed';
  if (status === '완료') return 'done';
  return 'pending';
}

// 메뉴 관리
async function loadMenus() {
  try {
    const { data, error } = await db.from('menu_items').select('*').order('menu_code');
    if (error) throw error;
    
    menus = data || [];
    renderMenuTable();
    updateMealSelect();
  } catch (error) {
    console.error('메뉴 로드 실패:', error);
  }
}

function renderMenuTable() {
  const tbody = document.getElementById('menuTable');
  tbody.innerHTML = menus.length === 0
    ? '<tr><td colspan="5" style="text-align:center;color:#64748B;">메뉴 없음</td></tr>'
    : menus.map(m => `
      <tr>
        <td><strong>${m.menu_code}</strong></td>
        <td>${m.menu_name}</td>
        <td style="color:#94A3B8;font-size:0.85rem;">${m.description || '-'}</td>
        <td>${m.calorie ? m.calorie + ' kcal' : '-'}</td>
        <td>
          <button class="btn btn-primary btn-sm" onclick="openEditMenu('${m.menu_code}')">수정</button>
          <button class="btn btn-danger btn-sm" onclick="deleteMenu('${m.menu_code}')">삭제</button>
        </td>
      </tr>
    `).join('');
}

function updateMealSelect() {
  document.getElementById('mealMenu').innerHTML = '<option value="">메뉴 선택</option>' +
    menus.map(m => `<option value="${m.menu_code}">${m.menu_code} - ${m.menu_name}</option>`).join('');
}

function showMealInfo() {
  const code = document.getElementById('mealMenu').value;
  const info = document.getElementById('mealInfo');
  const menu = menus.find(m => m.menu_code === code);
  
  if (menu) {
    info.classList.add('show');
    document.getElementById('infoName').textContent = menu.menu_name;
    document.getElementById('infoDesc').textContent = '재료: ' + (menu.description || '-');
    document.getElementById('infoCalorie').textContent = '칼로리: ' + (menu.calorie ? menu.calorie + ' kcal' : '-');
  } else {
    info.classList.remove('show');
  }
}

function openAddMenu() {
  document.getElementById('addMenuModal').classList.add('active');
  document.getElementById('newMenuCode').value = '';
  document.getElementById('newMenuName').value = '';
  document.getElementById('newMenuDesc').value = '';
  document.getElementById('newMenuCalorie').value = '';
}

function closeAddMenu() {
  document.getElementById('addMenuModal').classList.remove('active');
}

async function saveNewMenu() {
  const code = document.getElementById('newMenuCode').value.trim();
  const name = document.getElementById('newMenuName').value.trim();
  const desc = document.getElementById('newMenuDesc').value.trim();
  const calorie = parseInt(document.getElementById('newMenuCalorie').value) || null;
  
  if (!code || !name) {
    showMsg('코드와 이름 필수', 'error');
    return;
  }
  
  try {
    const { error } = await db.from('menu_items').insert([{
      menu_code: code,
      menu_name: name,
      description: desc,
      calorie: calorie
    }]);
    
    if (error) {
      if (error.code === '23505') throw new Error('이미 존재하는 코드');
      throw error;
    }
    
    showMsg('메뉴 추가 완료', 'success');
    closeAddMenu();
    loadMenus();
  } catch (error) {
    showMsg(error.message, 'error');
  }
}

function openEditMenu(code) {
  const menu = menus.find(m => m.menu_code === code);
  if (!menu) return;
  
  document.getElementById('editMenuCode').value = menu.menu_code;
  document.getElementById('editMenuName').value = menu.menu_name;
  document.getElementById('editMenuDesc').value = menu.description || '';
  document.getElementById('editMenuCalorie').value = menu.calorie || '';
  document.getElementById('editMenuModal').classList.add('active');
}

function closeEditMenu() {
  document.getElementById('editMenuModal').classList.remove('active');
}

async function saveEditMenu() {
  const code = document.getElementById('editMenuCode').value;
  const name = document.getElementById('editMenuName').value.trim();
  const desc = document.getElementById('editMenuDesc').value.trim();
  const calorie = parseInt(document.getElementById('editMenuCalorie').value) || null;
  
  if (!name) {
    showMsg('이름 필수', 'error');
    return;
  }
  
  try {
    const { error } = await db.from('menu_items').update({
      menu_name: name,
      description: desc,
      calorie: calorie
    }).eq('menu_code', code);
    
    if (error) throw error;
    
    showMsg('수정 완료', 'success');
    closeEditMenu();
    loadMenus();
  } catch (error) {
    showMsg(error.message, 'error');
  }
}

async function deleteMenu(code) {
  if (!confirm('삭제?')) return;
  
  try {
    const { error } = await db.from('menu_items').delete().eq('menu_code', code);
    if (error) {
      if (error.code === '23503') throw new Error('사용 중인 메뉴');
      throw error;
    }
    showMsg('삭제 완료', 'success');
    loadMenus();
  } catch (error) {
    showMsg(error.message, 'error');
  }
}

// 식단 관리
async function saveMeal() {
  const date = document.getElementById('mealDate').value;
  const time = document.getElementById('mealTime').value;
  const code = document.getElementById('mealMenu').value;
  
  if (!date || !code) {
    showMsg('날짜와 메뉴 필수', 'error');
    return;
  }
  
  const menu = menus.find(m => m.menu_code === code);
  if (!menu) {
    showMsg('메뉴 없음', 'error');
    return;
  }
  
  try {
    const { error } = await db.from('meals').insert([{
      meal_date: date,
      time: time,
      menu_code: code,
      name: menu.menu_name,
      description: menu.description,
      calorie: menu.calorie
    }]);
    
    if (error) throw error;
    
    showMsg(`${date} ${time} 식단 저장 완료`, 'success');
    document.getElementById('mealMenu').value = '';
    document.getElementById('mealInfo').classList.remove('show');
    loadMeals();
  } catch (error) {
    showMsg(error.message, 'error');
  }
}

async function loadMeals() {
  const month = document.getElementById('mealMonthFilter').value;
  if (!month) return;
  
  try {
    const { data, error } = await db.from('meals')
      .select('*')
      .gte('meal_date', month + '-01')
      .lt('meal_date', month + '-32')
      .order('meal_date');
    
    if (error) throw error;
    
    allMeals = data || [];
    renderMeals();
  } catch (error) {
    console.error('식단 로드 실패:', error);
  }
}

function renderMeals() {
  const tbody = document.getElementById('mealsTable');
  tbody.innerHTML = allMeals.length === 0
    ? '<tr><td colspan="5" style="text-align:center;color:#64748B;">식단 없음</td></tr>'
    : allMeals.map(m => `
      <tr>
        <td>${m.meal_date}</td>
        <td>${m.time}</td>
        <td>${m.name}</td>
        <td>${m.calorie ? m.calorie + ' kcal' : '-'}</td>
        <td><button class="btn btn-danger btn-sm" onclick="deleteMeal(${m.id})">삭제</button></td>
      </tr>
    `).join('');
}

async function deleteMeal(id) {
  if (!confirm('삭제?')) return;
  
  try {
    const { error } = await db.from('meals').delete().eq('id', id);
    if (error) throw error;
    showMsg('삭제 완료', 'success');
    loadMeals();
  } catch (error) {
    showMsg(error.message, 'error');
  }
}

// 고객 관리
async function loadCustomers() {
  try {
    const { data, error } = await db.from('users').select('*').order('created_at', { ascending: false });
    if (error) throw error;
    
    const tbody = document.getElementById('customersTable');
    tbody.innerHTML = (data || []).length === 0
      ? '<tr><td colspan="5" style="text-align:center;color:#64748B;">회원 없음</td></tr>'
      : (data || []).map(u => `
        <tr>
          <td>${u.user_id}</td>
          <td>${u.name}</td>
          <td>${u.email}</td>
          <td>${u.phone || '-'}</td>
          <td>${u.created_at ? new Date(u.created_at).toLocaleDateString() : '-'}</td>
        </tr>
      `).join('');
  } catch (error) {
    console.error('고객 로드 실패:', error);
  }
}

// 메시지
function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = (type === 'success' ? '✅ ' : '❌ ') + text;
  el.className = 'msg ' + type;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 3000);
}

window.addEventListener('load', init);
</script>
